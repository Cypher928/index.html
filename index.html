<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrustLedger — XRPL Wallet Auditor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --accent: #58a6ff;
      --accent2: #3fb950;
      --warn: #d29922;
      --danger: #f85149;
      --text: #c9d1d9;
      --muted: #8b949e;
      --radius: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      padding: 24px 16px 48px;
    }

    header { text-align: center; margin-bottom: 36px; }
    header h1 { font-size: 2rem; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
    header p  { color: var(--muted); margin-top: 6px; font-size: 0.95rem; }

    .badge {
      display: inline-block;
      background: #1f2937;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 0.75rem;
      color: var(--accent2);
      margin-top: 8px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 20px;
    }

    .search-row { display: flex; gap: 10px; flex-wrap: wrap; }

    .search-row input {
      flex: 1;
      min-width: 220px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-row input:focus       { border-color: var(--accent); }
    .search-row input::placeholder { color: var(--muted); }

    button {
      cursor: pointer;
      border: none;
      border-radius: var(--radius);
      padding: 10px 20px;
      font-size: 0.9rem;
      font-weight: 600;
      transition: opacity 0.2s, transform 0.1s;
    }
    button:active   { transform: scale(0.97); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary   { background: var(--accent);  color: #0d1117; }
    .btn-demo      { background: #21262d; color: var(--warn); border: 1px solid var(--border); }

    /* Spinner */
    .spinner-wrap {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 36px 0;
    }
    .spinner-wrap.active { display: flex; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error */
    .error-box {
      display: none;
      background: #1c1012;
      border: 1px solid var(--danger);
      border-radius: var(--radius);
      padding: 16px 18px;
      color: var(--danger);
      font-size: 0.9rem;
    }
    .error-box.active { display: block; }

    /* Trust Score */
    .score-section { display: none; }
    .score-section.active { display: block; }

    .score-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 24px;
      align-items: center;
    }

    /* SVG Gauge */
    .gauge-wrap { flex-shrink: 0; }

    .gauge-bg   { stroke: #30363d; }
    .gauge-fill {
      stroke: #3fb950;
      stroke-dasharray: 173;
      stroke-dashoffset: 173;
      transition: stroke-dashoffset 0.8s ease, stroke 0.4s ease;
    }
    .gauge-num  { font-size: 20px; font-weight: 700; fill: #c9d1d9; }
    .gauge-lbl  { font-size: 8px; fill: #8b949e; letter-spacing: 1px; }

    .score-details h3 { font-size: 1rem; margin-bottom: 6px; }
    .score-details p  { font-size: 0.85rem; color: var(--muted); line-height: 1.5; }

    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 12px;
      margin-top: 20px;
    }
    .stat-box { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; text-align: center; }
    .stat-box .stat-num { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
    .stat-box .stat-lbl { font-size: 0.7rem; color: var(--muted); margin-top: 3px; }

    /* Transactions */
    .tx-section { display: none; }
    .tx-section.active { display: block; }
    .tx-section h2 {
      margin-bottom: 14px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.8rem;
    }
    .tx-list { display: flex; flex-direction: column; gap: 10px; }

    .tx-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      border-left: 3px solid var(--border);
    }
    .tx-item.risk-low    { border-left-color: var(--accent2); }
    .tx-item.risk-medium { border-left-color: var(--warn); }
    .tx-item.risk-high   { border-left-color: var(--danger); }

    .tx-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }
    .tx-type    { font-weight: 600; font-size: 0.9rem; color: var(--text); }
    .tx-date    { font-size: 0.75rem; color: var(--muted); }
    .tx-summary { font-size: 0.85rem; color: var(--text); line-height: 1.5; }
    .tx-meta    { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }

    .chip { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; }
    .chip-low    { background: #0d2818; color: var(--accent2); }
    .chip-medium { background: #1f1a0a; color: var(--warn); }
    .chip-high   { background: #1c1012; color: var(--danger); }

    .tx-memo {
      margin-top: 8px;
      font-size: 0.78rem;
      color: var(--muted);
      background: #1a1f26;
      border-radius: 6px;
      padding: 6px 10px;
      word-break: break-all;
    }
    .addr { font-family: monospace; font-size: 0.78rem; color: var(--muted); }

    footer { text-align: center; color: var(--muted); font-size: 0.78rem; margin-top: 40px; }

    @media (max-width: 500px) {
      .score-grid { grid-template-columns: 1fr; justify-items: center; text-align: center; }
    }
  </style>
</head>
<body>

<header>
  <h1>TrustLedger</h1>
  <p>XRPL Wallet Auditor — Translate blockchain activity into plain English</p>
  <span class="badge">&#x25CF; Testnet Live</span>
</header>

<!-- Search -->
<div class="card">
  <div class="search-row">
    <input id="walletInput" type="text" placeholder="Enter XRPL wallet address (r...)" spellcheck="false" />
    <button class="btn-primary" id="auditBtn" onclick="auditWallet()">Audit Wallet</button>
    <button class="btn-demo" onclick="loadDemo()">Load Demo</button>
  </div>
</div>

<!-- Error -->
<div class="error-box" id="errorBox"></div>

<!-- Spinner -->
<div class="spinner-wrap" id="spinner">

</div>

<!-- Trust Score -->
<div class="card score-section" id="scoreSection">
  <div class="score-grid">

    <!-- SVG Arc Gauge -->
    <div class="gauge-wrap">
      <svg width="140" height="90" viewBox="0 0 140 90" aria-label="Trust score gauge">
        <!-- Background arc: semicircle center(70,78) radius 55 -->
        <path class="gauge-bg"   d="M 15 78 A 55 55 0 0 1 125 78" fill="none" stroke-width="12" stroke-linecap="round"/>
        <!-- Foreground arc (animated) -->
        <path class="gauge-fill" id="gaugeFill" d="M 15 78 A 55 55 0 0 1 125 78" fill="none" stroke-width="12" stroke-linecap="round"/>
        <!-- Score number -->
        <text class="gauge-num" id="gaugeNum" x="70" y="72" text-anchor="middle">—</text>
        <!-- Label -->
        <text class="gauge-lbl" id="gaugeLbl" x="70" y="86" text-anchor="middle">TRUST SCORE</text>
      </svg>
    </div>

    <div class="score-details">
      <h3 id="scoreLabel">—</h3>
      <p id="scoreDesc">—</p>
    </div>
  </div>
  <div class="stats-row" id="statsRow"></div>
</div>

<!-- Transactions -->
<div class="card tx-section" id="txSection">
  <h2 id="txHeading">Transactions</h2>
  <div class="tx-list" id="txList"></div>
</div>

<footer>TrustLedger &mdash; powered by XRPL Testnet &mdash; wss://s.altnet.rippletest.net:51233</footer>

<script>
// ─── Constants ───────────────────────────────────────────────────
const XRPL_WS      = 'wss://s.altnet.rippletest.net:51233';
const EPOCH_OFFSET = 946684800;
const GAUGE_ARC    = 172.79; // π × 55 (semicircle arc length for r=55)

// ─── Helpers ─────────────────────────────────────────────────────
function xrplDateToHuman(t) {
  return new Date((t + EPOCH_OFFSET) * 1000).toLocaleString(undefined, {
    year: 'numeric', month: 'short', day: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
}
function dropsToXRP(d) {
  return (parseInt(d, 10) / 1_000_000).toLocaleString(undefined,
    { minimumFractionDigits: 2, maximumFractionDigits: 6 });
}
function shortAddr(a) { return a ? a.slice(0,8) + '…' + a.slice(-6) : '—'; }
function isValidXRPLAddress(a) { return /^r[1-9A-HJ-NP-Za-km-z]{24,34}$/.test(a.trim()); }
function decodeMemo(m) {
  if (!m || !m.MemoData) return null;
  try {
    const s = m.MemoData.match(/.{1,2}/g).map(b => String.fromCharCode(parseInt(b,16))).join('');
    return s.replace(/[^\x20-\x7E]/g,'').trim() || null;
  } catch { return null; }
}
function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── UI helpers ──────────────────────────────────────────────────
function showError(msg) { const e = document.getElementById('errorBox'); e.textContent = msg; e.classList.add('active'); }
function hideError()    { document.getElementById('errorBox').classList.remove('active'); }
function showSpinner(m) { const w = document.getElementById('spinner'); w.querySelector('span').textContent = m||'Connecting…'; w.classList.add('active'); }
function hideSpinner()  { document.getElementById('spinner').classList.remove('active'); }
function hideSections() { document.getElementById('scoreSection').classList.remove('active'); document.getElementById('txSection').classList.remove('active'); }
function setAuditLoading(on) { const b = document.getElementById('auditBtn'); b.disabled = on; b.textContent = on ? 'Fetching…' : 'Audit Wallet'; }

// ─── Gauge renderer ──────────────────────────────────────────────
const GAUGE_COLORS = { high: '#3fb950', medium: '#d29922', low: '#f85149' };

function renderGauge(score, color) {
  const offset = GAUGE_ARC * (1 - score / 100);
  const fill   = document.getElementById('gaugeFill');
  const num    = document.getElementById('gaugeNum');
  fill.style.strokeDashoffset = offset;
  fill.style.stroke           = GAUGE_COLORS[color] || '#3fb950';
  num.style.fill              = GAUGE_COLORS[color] || '#c9d1d9';
  num.textContent             = score;
}

// ─── Score renderer ──────────────────────────────────────────────
function renderScore({ score, label, desc, color, statsHtml }) {
  renderGauge(score, color);
  document.getElementById('scoreLabel').textContent = label;
  document.getElementById('scoreDesc').textContent  = desc;
  if (statsHtml) document.getElementById('statsRow').innerHTML = statsHtml;
  document.getElementById('scoreSection').classList.add('active');
}

// ─── Transaction renderer ─────────────────────────────────────────
function renderTransactions(list) {
  const el = document.getElementById('txList');
  el.innerHTML = '';
  list.forEach(t => {
    const item = document.createElement('div');
    item.className = `tx-item risk-${t.risk.toLowerCase()}`;
    item.innerHTML = `
      <div class="tx-header">
        <span class="tx-type">${escapeHtml(t.plainType)}</span>
        <span class="tx-date">${escapeHtml(t.date)}</span>
      </div>
      <div class="tx-summary">${escapeHtml(t.summary)}</div>
      <div class="tx-meta">
        <span class="chip chip-${t.risk.toLowerCase()}">&#9679; ${t.risk} Risk</span>
        ${t.hash ? `<span class="addr">Tx: ${t.hash.slice(0,10)}…</span>` : ''}
      </div>
      ${t.memo ? `<div class="tx-memo">&#128221; Memo: ${escapeHtml(t.memo)}</div>` : ''}
    `;
    el.appendChild(item);
  });
  document.getElementById('txHeading').textContent = `${list.length} Transaction${list.length !== 1 ? 's' : ''} Found`;
  document.getElementById('txSection').classList.add('active');
}

// ─── XRPL WebSocket fetch ────────────────────────────────────────
function fetchXRPLTransactions(address) {
  return new Promise((resolve, reject) => {
    let ws;
    const timeout = setTimeout(() => {
      try { ws && ws.close(); } catch {}
      reject(new Error('Connection timed out. The XRPL testnet did not respond in time.'));
    }, 15000);

    try { ws = new WebSocket(XRPL_WS); }
    catch {
      clearTimeout(timeout);
      reject(new Error('Could not open WebSocket. Check your internet connection.'));
      return;
    }

    ws.onopen = () => {
      showSpinner('Connected — fetching transactions…');
      ws.send(JSON.stringify({ id: 1, command: 'account_tx', account: address,
        ledger_index_min: -1, ledger_index_max: -1, limit: 50, forward: false }));
    };
    ws.onmessage = event => {
      clearTimeout(timeout);
      try {
        const data = JSON.parse(event.data);
        ws.close();
        if (data.error) {
          reject(new Error(data.error === 'actNotFound'
            ? 'Wallet not found on testnet. Check the address or fund the account first.'
            : 'XRPL error: ' + (data.error_message || data.error)));
          return;
        }
        resolve((data.result && data.result.transactions) || []);
      } catch { reject(new Error('Failed to parse XRPL response.')); }
    };
    ws.onerror = () => { clearTimeout(timeout); reject(new Error('WebSocket error. Could not reach XRPL testnet.')); };
  });
}

// ─── Transaction translator ──────────────────────────────────────
function translateTx(entry, wallet) {
  const tx   = entry.tx || entry;
  const meta = entry.meta || entry.metaData || {};
  const type = tx.TransactionType || 'Unknown';
  const date = tx.date ? xrplDateToHuman(tx.date) : 'Unknown date';
  const acct = tx.Account || '';
  const dest = tx.Destination || '';
  const isSender = acct.toLowerCase() === wallet.toLowerCase();

  function fmt(a) {
    if (!a) return '';
    return typeof a === 'string' ? dropsToXRP(a) + ' XRP'
      : (parseFloat(a.value)||0).toLocaleString() + ' ' + (a.currency||'?');
  }

  let summary = '', amount = '', risk = 'Low', plainType = type;

  switch (type) {
    case 'Payment': {
      plainType = 'Payment'; amount = fmt(tx.Amount);
      summary = isSender ? `Sent ${amount} to ${shortAddr(dest)}.` : `Received ${amount} from ${shortAddr(acct)}.`;
      const drops = typeof tx.Amount === 'string' ? parseInt(tx.Amount) : 0;
      if (drops > 100_000_000_000) risk = 'High';
      else if (drops > 1_000_000_000) risk = 'Medium';
      break;
    }
    case 'EscrowCreate':  plainType = 'Escrow Created';   amount = fmt(tx.Amount); summary = `Locked ${amount} in escrow for ${shortAddr(dest)}.`; risk = 'Medium'; break;
    case 'EscrowFinish':  plainType = 'Escrow Released';  summary = `Escrow funds released to ${shortAddr(dest)}.`; break;
    case 'EscrowCancel':  plainType = 'Escrow Cancelled'; summary = `Escrow cancelled, funds returned to ${shortAddr(acct)}.`; break;
    case 'OfferCreate':   plainType = 'DEX Trade (Offer)'; summary = `DEX order: pay ${fmt(tx.TakerPays)} for ${fmt(tx.TakerGets)}.`; risk = 'Medium'; break;
    case 'OfferDelete':   plainType = 'DEX Offer Cancelled'; summary = `Cancelled an open DEX order.`; break;
    case 'TrustSet': {
      plainType = 'Trust Line Set';
      const lim = tx.LimitAmount;
      summary = `Set a trust line for ${lim ? lim.currency : '?'} issued by ${shortAddr(lim ? lim.issuer : '')}.`;
      risk = 'Medium'; break;
    }
    case 'AccountSet':    plainType = 'Account Settings'; summary = `Updated account settings or flags.`; break;
    case 'AccountDelete': plainType = 'Account Deleted';  summary = `Account deleted, XRP sent to ${shortAddr(dest)}.`; risk = 'High'; break;
    case 'SetRegularKey': plainType = 'Regular Key Set';  summary = tx.RegularKey ? `Set signing key: ${shortAddr(tx.RegularKey)}.` : `Removed signing key.`; risk = 'Medium'; break;
    case 'SignerListSet': plainType = 'Multi-Sig Updated'; summary = `Updated multi-signature signer list.`; risk = 'Medium'; break;
    case 'NFTokenMint':   plainType = 'NFT Minted';   summary = `Minted a new NFT on XRPL.`; break;
    case 'NFTokenBurn':   plainType = 'NFT Burned';   summary = `Permanently destroyed an NFT.`; break;
    default: plainType = type.replace(/([A-Z])/g,' $1').trim(); summary = `${plainType} transaction.`;
  }

  let memo = null;
  if (tx.Memos && tx.Memos[0]) memo = decodeMemo(tx.Memos[0].Memo);

  if (meta.TransactionResult && meta.TransactionResult !== 'tesSUCCESS') {
    risk = 'High';
    summary = '[FAILED] ' + summary + ' (' + meta.TransactionResult + ')';
  }

  return { type, plainType, summary, date, hash: tx.hash||'', account: acct, dest, amount, risk, memo, isSender };
}

// ─── Trust score calculator ──────────────────────────────────────
function calculateTrustScore(list) {
  if (!list.length) return { score: 0, label: 'No Data', desc: 'No transactions to evaluate.', color: 'low', statsHtml: '' };
  let score = 60;
  const total    = list.length;
  const highRisk = list.filter(t => t.risk === 'High').length;
  const medRisk  = list.filter(t => t.risk === 'Medium').length;
  const failed   = list.filter(t => t.summary.startsWith('[FAILED]')).length;
  const payments = list.filter(t => t.type === 'Payment').length;
  const escrows  = list.filter(t => t.type.startsWith('Escrow')).length;
  const deletes  = list.filter(t => t.type === 'AccountDelete').length;
  if (total >= 20) score += 10; else if (total >= 5) score += 5;
  if (escrows > 0) score += 5;
  if (payments > 3) score += 5;
  score -= highRisk * 8;
  score -= medRisk  * 2;
  score -= failed   * 5;
  score -= deletes  * 15;
  score = Math.max(0, Math.min(100, Math.round(score)));

  let label, desc, color;
  if      (score >= 70) { label = 'Trustworthy';    desc = 'Healthy on-chain activity with low-risk behaviour.'; color = 'high'; }
  else if (score >= 40) { label = 'Moderate Risk';  desc = 'Some activity warrants attention. Review flagged transactions.'; color = 'medium'; }
  else                  { label = 'High Risk';       desc = 'Multiple high-risk or failed transactions detected.'; color = 'low'; }

  const statsHtml = `
    <div class="stat-box"><div class="stat-num">${total}</div><div class="stat-lbl">Transactions</div></div>
    <div class="stat-box"><div class="stat-num" style="color:var(--accent2)">${payments}</div><div class="stat-lbl">Payments</div></div>
    <div class="stat-box"><div class="stat-num" style="color:var(--warn)">${medRisk}</div><div class="stat-lbl">Medium Risk</div></div>
    <div class="stat-box"><div class="stat-num" style="color:var(--danger)">${highRisk}</div><div class="stat-lbl">High Risk</div></div>
    <div class="stat-box"><div class="stat-num" style="color:var(--danger)">${failed}</div><div class="stat-lbl">Failed Txs</div></div>`;

  return { score, label, desc, color, statsHtml };
}

// ─── Main audit flow ─────────────────────────────────────────────
async function auditWallet() {
  const address = document.getElementById('walletInput').value.trim();
  hideError(); hideSections();
  if (!address)                    { showError('Please enter a wallet address.'); return; }
  if (!isValidXRPLAddress(address)){ showError('Invalid XRPL address. Addresses start with "r" and are 25–35 characters.'); return; }

  setAuditLoading(true);
  showSpinner('Connecting to XRPL testnet…');
  try {
    const rawList = await fetchXRPLTransactions(address);
    if (!rawList.length) { hideSpinner(); showError('No transactions found. The account may be inactive or unfunded.'); return; }
    const translations = rawList.map(e => translateTx(e, address));
    hideSpinner();
    renderScore(calculateTrustScore(translations));
    renderTransactions(translations);
  } catch (err) {
    hideSpinner();
    showError(err.message || 'Unexpected error. Please try again.');
  } finally {
    setAuditLoading(false);
  }
}

document.getElementById('walletInput').addEventListener('keydown', e => { if (e.key === 'Enter') auditWallet(); });
